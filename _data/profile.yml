summary:
  en: "My research focuses on reliable wireless links in high-mobility environments, with particular interest in delay-Doppler domain communications and integrated sensing and communications. I study signal models and estimation methods that connect communication theory with practical mobility and sensing requirements."
  zh: "我的研究聚焦高移动场景下的可靠无线传输，重点关注时延-多普勒域通信与通信感知一体化。研究内容涵盖无线信道建模、参数估计及面向移动与感知需求的通信理论和方法。"

research:
  - code: "01"
    title:
      en: "Delay-Doppler Communications"
      zh: "时延-多普勒域通信"
    description:
      en: "OTFS transmission, cross-frame processing, and robust parameter estimation for rapidly time-varying channels."
      zh: "面向快速时变信道的 OTFS 传输、跨帧处理与稳健参数估计。"
  - code: "02"
    title:
      en: "Integrated Sensing and Communications"
      zh: "通信感知一体化"
    description:
      en: "Joint waveform and estimation frameworks that support flexible sensing ranges alongside data transmission."
      zh: "兼顾数据传输与灵活感知范围的联合波形和参数估计框架。"
  - code: "03"
    title:
      en: "Wireless Channel Modeling"
      zh: "无线信道建模"
    description:
      en: "Statistical channel models for next-generation wireless systems, including limited-scattering environments."
      zh: "面向下一代无线系统的统计信道模型，包括有限散射传播环境。"
  - code: "04"
    title:
      en: "Multiple Access"
      zh: "多址接入"
    description:
      en: "Efficient access and resource coordination for future wireless networks."
      zh: "面向未来无线网络的高效接入与资源协同。"

